<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intimate — Factura</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--mag:#e91e8c;--pur:#7b2fff;--ink:#1a1d23;--ink2:#4b5563;--ink3:#9ca3af;--line:#f0f0f4;--ok:#16a34a;--warn:#d97706;--err:#dc2626}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f4f4f8;font-family:'DM Sans',-apple-system,system-ui,sans-serif;min-height:100vh;padding:1.5rem 1rem}
.wrap{max-width:680px;margin:0 auto}

/* Action bar */
.bar{display:flex;gap:.5rem;align-items:center;margin-bottom:1rem;flex-wrap:wrap;padding:.6rem .8rem;background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.btn{background:linear-gradient(135deg,var(--mag),var(--pur));color:#fff;border:none;padding:.55rem 1.1rem;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.83rem;display:flex;align-items:center;gap:.35rem;white-space:nowrap}
.btn:hover{opacity:.9}
.btn-out{background:#fff;border:1px solid #ddd;color:var(--ink2);font-weight:600}
.btn-wa{background:#25d366;color:#fff;border:none}
.btn-back{background:none;border:1px solid #e5e7eb;color:var(--ink3);margin-right:auto}

/* Main card */
.factura{background:#fff;color:var(--ink);border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1)}

/* Header stripe */
.f-header{background:linear-gradient(135deg,#1a1d23,#2d1b4e);padding:1.8rem 2.2rem;display:flex;justify-content:space-between;align-items:flex-start}
.f-brand{display:flex;flex-direction:column;gap:.3rem}
.f-logo{height:36px;width:auto;object-fit:contain;filter:brightness(0) invert(1);opacity:.95}
.f-brand-name{font-size:1.1rem;font-weight:800;color:#fff;letter-spacing:-.01em}
.f-brand-sub{font-size:.75rem;color:rgba(255,255,255,.5)}
.f-num-block{text-align:right}
.f-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.45);margin-bottom:.25rem}
.f-num{font-size:1.8rem;font-weight:800;color:#fff;line-height:1}
.f-date-top{font-size:.75rem;color:rgba(255,255,255,.5);margin-top:.3rem}

/* Status bar */
.f-status-bar{padding:.65rem 2.2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.f-status{display:inline-flex;align-items:center;gap:.4rem;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:.3rem .85rem;border-radius:100px}
.st-pendiente{background:#fef3c7;color:#92400e}
.st-entregada{background:#dbeafe;color:#1d4ed8}
.st-pagada{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.st-completada{background:#dcfce7;color:#15803d}
.st-cancelada{background:#fee2e2;color:#dc2626}
.st-fiado,.st-Fiado{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.f-pago-method{font-size:.8rem;color:var(--ink3);font-weight:500}
.f-pago-method span{color:var(--ink2);font-weight:700}

/* Parties */
.parties{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid var(--line)}
.party{padding:1.4rem 2.2rem;font-size:.86rem;line-height:1.6;color:var(--ink2)}
.party:first-child{border-right:1px solid var(--line)}
.party-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:.4rem}
.party-name{font-weight:800;color:var(--ink);font-size:.95rem;margin-bottom:.2rem}

/* Items */
.items-section{padding:1.4rem 2.2rem}
.items-header{display:grid;grid-template-columns:36px 1fr 72px 88px;gap:.8rem;padding:.4rem .6rem;margin-bottom:.3rem}
.items-header span{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3)}
.item{display:grid;grid-template-columns:36px 1fr 72px 88px;gap:.8rem;align-items:center;padding:.75rem .6rem;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:none}
.item:hover{background:#fafafa;border-radius:6px}
.item-q{font-size:.88rem;color:var(--ink3);font-weight:700;text-align:center}
.item-mid{display:flex;flex-direction:column;gap:.1rem}
.item-n{font-weight:700;font-size:.9rem;color:var(--ink)}
.item-n.free{color:var(--ok)}
.item-u{font-size:.78rem;color:var(--ink3)}
.item-unit-p{text-align:right;font-size:.85rem;color:var(--ink2)}
.item-tot{text-align:right;font-size:.9rem;font-weight:700;color:var(--ink)}

/* Totals */
.totals{border-top:1px solid var(--line);padding:1.2rem 2.2rem}
.totals .r{display:flex;justify-content:space-between;padding:.28rem 0;font-size:.9rem;color:var(--ink2)}
.totals .r b{color:var(--ink);font-weight:600}
.totals .disc{color:var(--err)}
.total-box{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.2rem;background:linear-gradient(135deg,#fdf2f8,#f5f3ff);border:1px solid #f3d8e8;border-radius:10px;margin-top:.8rem}
.total-box-l{font-size:.88rem;font-weight:700;color:var(--ink2)}
.total-box-v{font-size:1.75rem;font-weight:800;color:var(--mag)}

/* Footer */
.f-foot{padding:1.2rem 2.2rem;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;background:#fafafa}
.f-bank{font-size:.82rem;color:var(--ink2);font-weight:700}
.f-date-foot{font-size:.75rem;color:var(--ink3)}

.empty{text-align:center;padding:4rem;color:var(--ink3)}

@media(max-width:540px){
  .factura{border-radius:10px}
  .f-header,.f-status-bar,.parties,.items-section,.totals,.f-foot{padding-left:1.2rem;padding-right:1.2rem}
  .parties{grid-template-columns:1fr}
  .party:first-child{border-right:none;border-bottom:1px solid var(--line)}
  .items-header,.item{grid-template-columns:28px 1fr 60px 72px}
}
@media print{
  body{background:#fff;padding:0}
  .bar{display:none}
  .factura{box-shadow:none;border-radius:0}
  .f-congrats{display:none}
  .f-header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .total-box{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
/* TICKET 80mm */
body.ticket-mode .wrap{max-width:80mm}
body.ticket-mode .factura{border-radius:0}
body.ticket-mode .f-header{padding:8mm 6mm;flex-direction:column;align-items:center;gap:.4rem;text-align:center}
body.ticket-mode .f-num-block{text-align:center}
body.ticket-mode .parties{grid-template-columns:1fr;border:none}
body.ticket-mode .party:first-child{border-right:none;border-bottom:1px solid var(--line);padding:6mm 6mm 4mm}
body.ticket-mode .party{padding:4mm 6mm;font-size:11px}
body.ticket-mode .items-header,.body.ticket-mode .item{padding:.4rem 4mm}
body.ticket-mode .items-section{padding:.8rem 4mm}
body.ticket-mode .totals{padding:.8rem 4mm}
body.ticket-mode .f-foot{padding:.6rem 4mm}
body.ticket-mode .total-box-v{font-size:1.2rem}
@media print{body.ticket-mode .factura{width:80mm}}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <button class="btn btn-back" onclick="history.length>1?history.back():location.href='/'">← Volver</button>
    <button class="btn btn-out" onclick="printA4()">🖨 Imprimir</button>
    <button class="btn btn-out" onclick="printTicket()">🧾 Ticket</button>
    <button class="btn btn-wa" onclick="shareWA()" id="btn-wa" style="display:none">📤 WhatsApp</button>
    <button class="btn" onclick="dlPDF()">⬇ PDF</button>
  </div>
  <div id="content" class="factura"><div class="empty">Cargando...</div></div>
</div>
<script>
const SUPABASE_URL='https://zthlaomiqlncyvxnmvmu.supabase.co';
const SUPABASE_KEY='sb_publishable_0mrKmeEYywvvO9yL09T13Q_jJcC2ujM';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const fmt=n=>'RD$ '+Number(n||0).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=d=>d?new Date(d).toLocaleString('es-DO',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);
let state={venta:null,cliente:null,cfg:null};
let logoData=null;
// precargar logo para el PDF
(function(){
  const img=new Image();img.crossOrigin='anonymous';
  img.onload=function(){
    try{const cv=document.createElement('canvas');cv.width=img.width;cv.height=img.height;
    cv.getContext('2d').drawImage(img,0,0);logoData={d:cv.toDataURL('image/png'),w:img.width,h:img.height};}catch(e){}
  };
  img.src='/logo.png';
})();

function showFacturaError(msg){
  document.getElementById('content').innerHTML=
    '<div class="empty" style="padding:3rem 1rem">'+
    '<p style="margin-bottom:1rem">'+msg+'</p>'+
    '<a href="https://wa.me/18292913180" target="_blank" rel="noopener" style="color:#e91e8c;text-decoration:underline">Contactar soporte por WhatsApp →</a>'+
    '</div>';
}
async function load(){
  const numero=new URLSearchParams(location.search).get('n');
  if(!numero){showFacturaError('Falta número de factura en el enlace.');return}
  const timeoutId=setTimeout(()=>showFacturaError('La factura tardó demasiado en cargar. Verifica tu conexión e intenta de nuevo.'),10000);
  try{
    const{data,error}=await sb.rpc('get_factura',{p_numero:numero});
    clearTimeout(timeoutId);
    if(error||!data){showFacturaError('Factura no encontrada. Verifica el enlace.');return}
    let vendedor=null;
    if(data.vendedor_id){
      const{data:vd}=await sb.from('usuarios').select('nombre,telefono').eq('id',data.vendedor_id).maybeSingle();
      vendedor=vd||null;
    }
    state={venta:data,cliente:data.cliente||null,cfg:data.config||{nombre:'Intimate'},vendedor};
    render();
  }catch(e){
    clearTimeout(timeoutId);
    showFacturaError('Error al cargar la factura. Verifica tu conexión e intenta de nuevo.');
  }
}

function getItems(){
  const v=state.venta;
  let items=v.items;
  if(items&&Array.isArray(items)&&items.length)return items;
  // fallback: parsear descripcion
  return (v.descripcion||'').split(/\s*,\s*/).map(p=>{
    const m=p.trim().match(/^(\d+)\s*[xX]\s*(.+)$/);
    return m?{qty:+m[1],nombre:m[2].trim(),precio_unit:0,subtotal:0}:null;
  }).filter(Boolean);
}

function render(){
  const{venta:v,cliente:c,cfg,vendedor}=state;
  const items=getItems();
  const totalQty=items.reduce((a,it)=>a+(+it.qty||0),0);
  const st=v.status||'';
  const mp=v.metodo_pago||'';
  const esFiado=['Fiado','Credito','fiado','credito'].includes(mp)&&st==='pendiente';

  // Show WA button if client has phone
  const cPhone=c?.telefono||v.cliente_telefono||'';
  if(cPhone){const b=document.getElementById('btn-wa');if(b)b.style.display='flex';}

  const itemsHtml=items.map(it=>{
    const free=/gratis|promo/i.test(it.nombre||'')||(+it.precio_unit===0&&+it.qty>0);
    return `<div class="item">
      <div class="item-q">${it.qty}×</div>
      <div class="item-mid">
        <div class="item-n${free?' free':''}">${esc(it.nombre)}</div>
        <div class="item-u">${(+it.precio_unit)>0?fmt(it.precio_unit)+' c/u':'Gratis'}</div>
      </div>
      <div class="item-unit-p">${(+it.precio_unit)>0?fmt(it.precio_unit):''}</div>
      <div class="item-tot">${free?'<span style="color:var(--ok)">Gratis</span>':fmt(it.subtotal)}</div>
    </div>`;
  }).join('');

  const vendedorLine=vendedor?`<div style="margin-top:.2rem;font-size:.78rem;color:var(--ink3)">Vendedor: ${esc(vendedor.nombre||'')}${vendedor.telefono?' · '+esc(vendedor.telefono):''}</div>`:'';
  const negLines=[cfg.telefono,cfg.direccion].filter(Boolean).map(x=>`<div>${esc(x)}</div>`).join('')+vendedorLine;
  const cliLines=c?[c.telefono,c.direccion].filter(Boolean).map(x=>`<div>${esc(x)}</div>`).join(''):'';
  const statusLabel=esFiado?'fiado':(st||'pendiente');

  document.getElementById('content').innerHTML=`
    <div class="f-header">
      <div class="f-brand">
        <img src="/logo.png" alt="Intimate" class="f-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <div class="f-brand-name" style="display:none">${esc(cfg.nombre||'Intimate RD')}</div>
        <div class="f-brand-sub">${esc(cfg.telefono||'preservativosintimateRD.com')}</div>
      </div>
      <div class="f-num-block">
        <div class="f-label">Factura</div>
        <div class="f-num">#${esc(v.numero)}</div>
        <div class="f-date-top">${fmtD(v.fecha||v.created_at)}</div>
      </div>
    </div>
    <div class="f-status-bar">
      <span class="f-status st-${statusLabel}">${statusLabel==='pagada'?'✓ Pagada':statusLabel==='fiado'?'💸 Fiado pendiente':statusLabel==='cancelada'?'✕ Cancelada':'⏳ '+statusLabel}</span>
      <div class="f-pago-method">Pago: <span>${esc(mp||'—')}</span>${vendedor?` · Vendedor: <span>${esc(vendedor.nombre||'')}</span>`:''}</div>
    </div>
    <div class="parties">
      <div class="party">
        <div class="party-label">De</div>
        <div class="party-name">${esc(cfg.nombre||'Intimate RD')}</div>
        ${negLines}
      </div>
      <div class="party">
        <div class="party-label">Para</div>
        <div class="party-name">${esc(c?c.nombre:(v.cliente||'Cliente general'))}</div>
        ${cliLines}
      </div>
    </div>
    <div class="items-section">
      <div class="items-header">
        <span style="text-align:center">Qty</span>
        <span>Producto</span>
        <span style="text-align:right">Precio</span>
        <span style="text-align:right">Subtotal</span>
      </div>
      ${itemsHtml}
    </div>
    <div class="totals">
      ${Number(v.subtotal)>0&&Number(v.subtotal)!==Number(v.total)?`<div class="r"><span>Subtotal</span><b>${fmt(v.subtotal)}</b></div>`:''}
      ${Number(v.descuento)>0?`<div class="r disc"><span>Descuento${v.descuento_pct?' ('+(+v.descuento_pct).toFixed(2)+'%)':''}</span><span>-${fmt(v.descuento)}</span></div>`:''}
      ${Number(v.impuesto)>0?`<div class="r"><span>ITBIS (18%)</span><b>${fmt(v.impuesto)}</b></div>`:''}
      ${Number(v.delivery)>0?`<div class="r"><span>Delivery</span><b>${fmt(v.delivery)}</b></div>`:''}
      <div class="total-box">
        <div class="total-box-l">${items.length} item${items.length!==1?'s':''} · ${totalQty} unidades</div>
        <div class="total-box-v">${fmt(v.total)}</div>
      </div>
    </div>
    <div class="f-foot">
      <div class="f-bank">${cfg.footer_factura?esc(cfg.footer_factura):'💊 Intimate RD · preservativosintimateRD.com'}</div>
      <div class="f-date-foot">${fmtD(v.fecha||v.created_at)}</div>
    </div>
  `;
}

function shareWA(){
  const{venta:v,cliente:c}=state;
  const phone=(c?.telefono||'').replace(/\D/g,'');
  const url=location.href;
  const msg=`Hola${c?.nombre?' '+c.nombre:''}! Tu factura #${v.numero} por ${fmt(v.total)} está lista: ${url}`;
  window.open('https://wa.me/'+phone+'?text='+encodeURIComponent(msg),'_blank');
}

function printA4(){document.body.classList.remove('ticket-mode');window.print();}
function printTicket(){document.body.classList.add('ticket-mode');window.print();setTimeout(()=>document.body.classList.remove('ticket-mode'),600);}

function dlPDF(){
  const{venta:v,cliente:c,cfg}=state;
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const items=getItems();
  const totalQty=items.reduce((a,it)=>a+(+it.qty||0),0);
  let y=20;

  if(logoData){
    const lw=34,lh=lw*logoData.h/logoData.w;
    doc.addImage(logoData.d,'PNG',15,y-6,lw,lh);
  }else{
    doc.setFontSize(20);doc.setTextColor(58,63,76);doc.setFont(undefined,'bold');
    doc.text(cfg.nombre||'Intimate',15,y);
  }
  doc.setFontSize(15);doc.setTextColor(58,63,76);doc.setFont(undefined,'bold');
  doc.text('#'+v.numero,195,y,{align:'right'});

  y+=14;doc.setFontSize(9);doc.setTextColor(107,114,128);doc.setFont(undefined,'normal');
  doc.setTextColor(58,63,76);doc.setFont(undefined,'bold');doc.setFontSize(10);
  doc.text(cfg.nombre||'Intimate',15,y);y+=5;
  doc.setFontSize(9);doc.setTextColor(107,114,128);doc.setFont(undefined,'normal');
  if(cfg.telefono){doc.text(cfg.telefono,15,y);y+=4.5;}
  if(cfg.direccion){doc.splitTextToSize(cfg.direccion,90).forEach(l=>{doc.text(l,15,y);y+=4.5;});}

  let yc=29;doc.setFontSize(10);doc.setTextColor(58,63,76);doc.setFont(undefined,'bold');
  doc.text(c?c.nombre:(v.cliente||'Cliente general'),195,yc,{align:'right'});
  doc.setFontSize(9);doc.setTextColor(107,114,128);doc.setFont(undefined,'normal');
  yc+=4.5;
  if(c&&c.telefono){doc.text(c.telefono,195,yc,{align:'right'});yc+=4.5;}

  y=Math.max(y,yc)+6;
  doc.setFontSize(10);doc.setTextColor(58,63,76);doc.setFont(undefined,'bold');
  doc.text(items.length+' items (Qty.: '+totalQty+')',15,y);y+=2;

  doc.autoTable({
    startY:y,
    body:items.map(it=>[it.qty+'x',(it.nombre||'')+'\n'+((+it.precio_unit)>0?fmt(it.precio_unit):'Gratis'),fmt(it.subtotal)]),
    theme:'plain',
    styles:{fontSize:9,cellPadding:{top:2.5,bottom:2.5,left:1,right:1},textColor:[58,63,76],lineColor:[232,232,236],lineWidth:{bottom:.2}},
    columnStyles:{0:{cellWidth:14,textColor:[156,163,175]},1:{cellWidth:120},2:{halign:'right'}}
  });
  y=doc.lastAutoTable.finalY+8;

  doc.setFontSize(10);
  const rt=(label,val,opt={})=>{
    doc.setTextColor(opt.red?226:107,opt.red?56:114,opt.red?56:128);
    doc.setFont(undefined,opt.bold?'bold':'normal');
    doc.text(label,140,y);doc.text(val,195,y,{align:'right'});y+=6;
  };
  rt('Subtotal',fmt(v.subtotal));
  if(Number(v.descuento)>0)rt('Descuento'+(v.descuento_pct?' ('+(+v.descuento_pct).toFixed(2)+'%)':''),fmt(v.descuento),{red:true,bold:true});
  if(Number(v.impuesto)>0)rt('ITBIS (18%)',fmt(v.impuesto));
  if(Number(v.delivery)>0)rt('Delivery',fmt(v.delivery));
  y+=2;doc.setFontSize(15);doc.setTextColor(58,63,76);doc.setFont(undefined,'bold');
  doc.text('Total: '+fmt(v.total),195,y,{align:'right'});

  y+=18;doc.setFontSize(9.5);doc.setTextColor(58,63,76);doc.setFont(undefined,'bold');
  if(cfg.footer_factura)doc.text(cfg.footer_factura,105,y,{align:'center'});
  y+=8;doc.setFontSize(8);doc.setTextColor(156,163,175);doc.setFont(undefined,'normal');
  doc.text(fmtD(v.fecha||v.created_at),105,y,{align:'center'});

  doc.save('factura-'+v.numero+'.pdf');
}

load();
</script>
</body>
</html>
