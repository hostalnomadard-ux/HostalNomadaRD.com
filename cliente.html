<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intimate — Mi Cuenta</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--mag:#e91e8c;--pur:#7b2fff;--cyan:#00d4ff;--dark:#0a0a0f;--dark2:#12121a;--card:#1a1a28;--text:#f0f0f5;--muted:#a0a0c0;--err:#ff5577;--ok:#22c55e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.auth-box{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:2.5rem;width:100%;max-width:380px;text-align:center}
.auth-logo{height:40px;margin-bottom:1.5rem}
.auth-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;background:rgba(255,255,255,.04);border-radius:10px;padding:.3rem}
.auth-tab{flex:1;padding:.5rem;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--muted);transition:all .2s;border:none;background:none;font-family:inherit}
.auth-tab.active{background:var(--mag);color:#fff}
.fi{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.85rem 1rem;color:var(--text);font-size:.97rem;outline:none;margin-bottom:.8rem;font-family:inherit}
.fi:focus{border-color:var(--mag)}
.abtn{width:100%;background:var(--mag);color:#fff;border:none;padding:.95rem;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:.5rem;font-family:inherit;transition:opacity .2s}
.abtn:disabled{opacity:.6;cursor:wait}
.aerr{color:#ff8080;font-size:.82rem;margin-top:.6rem;display:none;text-align:left}
.aok{color:#4ade80;font-size:.82rem;margin-top:.6rem;display:none}
#dashScreen{display:none}
.topbar{background:var(--dark2);border-bottom:1px solid rgba(255,255,255,.06);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.topbar img{height:32px}
.topbar-right{display:flex;align-items:center;gap:1rem}
.user-badge{background:rgba(233,30,140,.1);border:1px solid rgba(233,30,140,.2);color:var(--mag);padding:.35rem .9rem;border-radius:100px;font-size:.82rem;font-weight:600}
.logout-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--muted);padding:.4rem 1rem;border-radius:100px;cursor:pointer;font-size:.82rem;font-family:inherit;min-height:44px;display:inline-flex;align-items:center}
.dash-content{padding:2rem;max-width:900px;margin:0 auto}
.dash-title{font-size:1.6rem;font-weight:700;margin-bottom:.3rem}
.dash-sub{color:var(--muted);font-size:.88rem;margin-bottom:2rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:2.5rem}
.stat{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:1.2rem 1.5rem}
.stat-val{font-size:1.8rem;font-weight:700}
.stat-lbl{color:var(--muted);font-size:.75rem;margin-top:.2rem;text-transform:uppercase;letter-spacing:.06em}
.section-title{font-size:1rem;font-weight:700;margin-bottom:1rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.tbl-wrap{overflow-x:auto;border-radius:14px;border:1px solid rgba(255,255,255,.06)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead tr{background:var(--dark2)}
th{padding:.75rem 1rem;text-align:left;color:var(--muted);font-weight:600;font-size:.73rem;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
td{padding:.85rem 1rem;border-top:1px solid rgba(255,255,255,.04)}
.badge{display:inline-block;padding:.2rem .6rem;border-radius:100px;font-size:.72rem;font-weight:700}
.badge-cons{background:rgba(0,212,255,.1);color:var(--cyan)}
.badge-farm{background:rgba(233,30,140,.1);color:var(--mag)}
.badge-dist{background:rgba(123,47,255,.1);color:#b57bff}
.badge-pend{background:rgba(255,200,0,.12);color:#ffc800}
.badge-entr{background:rgba(0,212,255,.12);color:var(--cyan)}
.badge-paga{background:rgba(123,47,255,.12);color:#b57bff}
.badge-comp{background:rgba(34,197,94,.12);color:#22c55e}
.badge-canc{background:rgba(255,85,119,.12);color:#ff5577}
.badge{text-transform:capitalize}
.total-mag{color:var(--mag);font-weight:700}
.empty{text-align:center;padding:3rem;color:var(--muted)}
.new-order-btn{display:inline-block;background:var(--mag);color:#fff;padding:.8rem 2rem;border-radius:100px;text-decoration:none;font-weight:700;font-size:.92rem;margin-bottom:2rem;box-shadow:0 0 20px rgba(233,30,140,.25)}
.ver-btn{background:none;border:1px solid rgba(233,30,140,.3);color:var(--mag);border-radius:8px;padding:.3rem .7rem;font-size:.78rem;cursor:pointer;font-family:inherit;transition:background .15s}
.ver-btn:hover{background:rgba(233,30,140,.1)}
.od-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:999;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.od-overlay.show{opacity:1;pointer-events:auto}
.od-sheet{background:var(--dark2,#12121a);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:1.5rem 1.5rem 2rem;max-height:85vh;overflow-y:auto;transform:translateY(40px);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.od-overlay.show .od-sheet{transform:translateY(0)}
.od-row{display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.88rem}
.od-row:last-child{border-bottom:none}
.od-label{color:var(--muted,#888);font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.od-val{font-weight:600;text-align:right;max-width:65%;word-break:break-word}
.od-close{background:none;border:1px solid rgba(255,255,255,.15);color:var(--muted,#888);border-radius:8px;padding:.5rem 1.2rem;cursor:pointer;font-family:inherit;font-size:.85rem;margin-top:1.2rem;width:100%;transition:border-color .15s}
.od-close:hover{border-color:rgba(255,255,255,.35)}
@media(max-width:640px){
  .tbl-wrap{border:none}
  table,thead,tbody,th,td,tr{display:block}
  thead{display:none}
  td{padding:.55rem 0;border-top:none;border-bottom:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;font-size:.83rem}
  td::before{content:attr(data-label);color:var(--muted);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;padding-top:.1rem}
  tr{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:.75rem 1rem;margin-bottom:.65rem}
  .stat-val{font-size:1.5rem}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="auth-box">
    <img src="cliente_img1.webp" alt="Intimate" class="auth-logo">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchTab('register')">Crear cuenta</button>
    </div>
    <div id="loginForm">
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:1.2rem">Ve el estado de tus pedidos</p>
      <input type="email" class="fi" id="loginEmail" placeholder="tu@email.com">
      <input type="password" class="fi" id="loginPwd" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
      <div class="aerr" id="loginErr"></div>
      <button class="abtn" onclick="doLogin()">Entrar</button>
    </div>
    <div id="registerForm" style="display:none">
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:1.2rem">Crea tu cuenta para seguir pedidos</p>
      <input type="email" class="fi" id="regEmail" placeholder="tu@email.com">
      <input type="password" class="fi" id="regPwd" placeholder="Contraseña (mín. 6 caracteres)" onkeydown="if(event.key==='Enter')doRegister()">
      <div class="aerr" id="regErr"></div>
      <div class="aok" id="regOk"></div>
      <button class="abtn" onclick="doRegister()">Crear cuenta</button>
    </div>
  </div>
</div>

<div id="dashScreen">
  <div class="topbar">
    <img src="cliente_img2.webp" alt="Intimate">
    <div class="topbar-right">
      <span class="user-badge" id="userEmail"></span>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="dash-content">
    <div class="dash-title">Mis pedidos</div>
    <div class="dash-sub">Historial completo de tus órdenes</div>
    <a href="/" class="new-order-btn">+ Hacer nuevo pedido</a>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="myOrders">—</div><div class="stat-lbl">Pedidos</div></div>
      <div class="stat"><div class="stat-val" id="myUnits">—</div><div class="stat-lbl">Unidades</div></div>
      <div class="stat"><div class="stat-val" id="myTotal">—</div><div class="stat-lbl">Total RD$</div></div>
    </div>
    <div class="section-title">Historial</div>
    <div style="display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.85rem;align-items:center">
      <span style="font-size:.7rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-right:.2rem">Estado:</span>
      <span style="display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;background:rgba(255,200,0,.12);color:#ffc800;border:1px solid rgba(255,200,0,.25);border-radius:100px;padding:.2rem .6rem;font-weight:700">🟡 Pendiente</span>
      <span style="display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;background:rgba(0,212,255,.12);color:#00d4ff;border:1px solid rgba(0,212,255,.25);border-radius:100px;padding:.2rem .6rem;font-weight:700">🔵 Entregada</span>
      <span style="display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;background:rgba(123,47,255,.12);color:#b57bff;border:1px solid rgba(123,47,255,.25);border-radius:100px;padding:.2rem .6rem;font-weight:700">🟣 Pagada</span>
      <span style="display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25);border-radius:100px;padding:.2rem .6rem;font-weight:700">✅ Completada</span>
      <span style="display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;background:rgba(255,85,119,.12);color:#ff5577;border:1px solid rgba(255,85,119,.25);border-radius:100px;padding:.2rem .6rem;font-weight:700">🔴 Cancelada</span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr><th>Fecha</th><th>Factura</th><th>Productos</th><th>Cant.</th><th>Estado</th><th>Total</th><th></th></tr>
        </thead>
        <tbody id="myOrdersBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SURL='https://zthlaomiqlncyvxnmvmu.supabase.co';
let allOrders=[];
function htmlEsc(s){
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
const SKEY='sb_publishable_0mrKmeEYywvvO9yL09T13Q_jJcC2ujM';
const {createClient}=supabase;
const db=createClient(SURL,SKEY);

function switchTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('loginForm').style.display=tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display=tab==='register'?'block':'none';
}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pwd=document.getElementById('loginPwd').value;
  const err=document.getElementById('loginErr');
  err.style.display='none';
  const btn=document.querySelector('#loginForm .abtn');
  btn.disabled=true;btn.textContent='Entrando...';btn.setAttribute('aria-busy','true');
  const {data,error}=await db.auth.signInWithPassword({email,password:pwd});
  if(error){err.textContent='Email o contraseña incorrectos.';err.style.display='block';btn.disabled=false;btn.textContent='Entrar';btn.removeAttribute('aria-busy');return;}
  showDash(data.user);
}

async function doRegister(){
  const email=document.getElementById('regEmail').value.trim();
  const pwd=document.getElementById('regPwd').value;
  const err=document.getElementById('regErr');
  const ok=document.getElementById('regOk');
  err.style.display='none';ok.style.display='none';
  if(pwd.length<6){err.textContent='Contraseña mínimo 6 caracteres.';err.style.display='block';return;}
  const btn=document.querySelector('#registerForm .abtn');
  btn.disabled=true;btn.textContent='Creando...';btn.setAttribute('aria-busy','true');
  const {data,error}=await db.auth.signUp({email,password:pwd});
  if(error){err.textContent=error.message;err.style.display='block';btn.disabled=false;btn.textContent='Crear cuenta';btn.removeAttribute('aria-busy');return;}
  ok.textContent='Cuenta creada. Revisa tu email para confirmar.';ok.style.display='block';
  btn.disabled=false;btn.textContent='Crear cuenta';btn.removeAttribute('aria-busy');
  if(data.user&&data.session) showDash(data.user);
}

async function doLogout(){
  await db.auth.signOut();
  document.getElementById('dashScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}

async function showDash(user){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashScreen').style.display='block';
  document.getElementById('userEmail').textContent=user.email;
  document.querySelectorAll('.stat-val').forEach(el=>el.textContent='...');
  const ordersBody=document.getElementById('myOrdersBody');
  if(ordersBody)ordersBody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--muted)">Cargando...</td></tr>';
  // Buscar cliente por email
  const {data:cli}=await db.from('clientes').select('id').eq('email',user.email).maybeSingle();
  if(cli){
    const {data}=await db.from('ventas').select('*').eq('cliente_id',cli.id).order('fecha',{ascending:false});
    allOrders=data||[];
  }
  const orders=allOrders;
  // Si no hay cliente vinculado, mostrar mensaje de ayuda
  if(!cli&&!orders.length){
    document.getElementById('myOrders').textContent='0';
    document.getElementById('myUnits').textContent='0';
    document.getElementById('myTotal').textContent='0';
    document.getElementById('myOrdersBody').innerHTML='<tr><td colspan="7" class="empty" style="padding:2rem"><div style="margin-bottom:.6rem">Sin pedidos vinculados a esta cuenta.</div><div style="font-size:.8rem;color:var(--muted)">Si ya realizaste pedidos, pídele a tu vendedor que vincule tu email <strong style="color:var(--text)">'+htmlEsc(user.email)+'</strong> a tu perfil de cliente.</div></td></tr>';
    return;
  }
  document.getElementById('myOrders').textContent=orders.length;
  document.getElementById('myUnits').textContent=orders.reduce((s,o)=>s+(o.cantidad||0),0);
  document.getElementById('myTotal').textContent=orders.reduce((s,o)=>s+(o.total||0),0).toLocaleString();
  if(!orders.length){
    document.getElementById('myOrdersBody').innerHTML='<tr><td colspan="7" class="empty">No tienes pedidos. <a href="/" style="color:var(--mag)">Haz tu primer pedido</a></td></tr>';
    return;
  }
  const stMap={pendiente:'badge-pend',entregada:'badge-entr',pagada:'badge-paga',completada:'badge-comp',cancelada:'badge-canc'};
  document.getElementById('myOrdersBody').innerHTML=orders.map(o=>{
    const fecha=o.fecha?new Date(o.fecha).toLocaleDateString('es-DO',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
    const st=o.status||'pendiente';
    const stc=stMap[st]||'badge-pend';
    return '<tr><td data-label="Fecha" style="color:var(--muted);white-space:nowrap">'+fecha+'</td><td data-label="Factura">'+(o.numero||'—')+'</td><td data-label="Productos" style="font-size:.82rem">'+(o.descripcion||'—')+'</td><td data-label="Cant." style="text-align:center">'+(o.cantidad||0)+'</td><td data-label="Estado"><span class="badge '+stc+'">'+st+'</span></td><td data-label="Total" class="total-mag">RD$'+(o.total||0).toLocaleString()+'</td>'
      +'<td data-label=""><button class="ver-btn" data-numero="'+htmlEsc(o.numero||'')+'">Ver →</button></td></tr>';
  }).join('');
  document.querySelectorAll('.ver-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ verDetalle(this.dataset.numero); });
  });
}

function verDetalle(numero){
  const o=allOrders.find(x=>x.numero===numero);
  if(!o)return;
  const parseObs=function(key){
    const m=(o.observacion||'').match(new RegExp(key+':\\s*([^·\\n]+)'));
    return m?m[1].trim():'—';
  };
  const fecha=o.fecha?new Date(o.fecha).toLocaleDateString('es-DO',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
  const stMap={pendiente:'🟡 Pendiente',entregada:'🔵 Entregada',pagada:'🟢 Pagada',completada:'✅ Completada',cancelada:'🔴 Cancelada'};
  const stLabel=stMap[o.status]||o.status||'—';
  const pago=o.metodo_pago||parseObs('Pago');
  const envio=parseObs('Envío');
  const dir=parseObs('Dirección');
  const est=parseObs('Estación');
  const nota=parseObs('Nota');
  let rows=
    odRow('Número',o.numero||'—')+
    odRow('Fecha',fecha)+
    odRow('Estado',stLabel)+
    odRow('Productos',o.descripcion||'—')+
    odRow('Cantidad',(o.cantidad||0)+' unidades')+
    odRow('Método de pago',pago)+
    odRow('Envío',envio);
  if(dir&&dir!=='—')rows+=odRow('Dirección',dir);
  if(est&&est!=='—')rows+=odRow('Estación',est);
  if(nota&&nota!=='—')rows+=odRow('Nota',nota);
  rows+=odRow('Total','RD$ '+(Number(o.total||0)).toLocaleString(),'total-mag');
  document.getElementById('odContent').innerHTML=rows;
  document.getElementById('odOverlay').classList.add('show');
  setTimeout(function(){document.querySelector('.od-close')?.focus();},50);
}
function odRow(label,val,cls){
  return '<div class="od-row"><span class="od-label">'+htmlEsc(label)+'</span><span class="od-val'+(cls?' '+cls:'')+'">'+(val?htmlEsc(String(val)):'—')+'</span></div>';
}
function cerrarDetalle(){
  document.getElementById('odOverlay').classList.remove('show');
}
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')cerrarDetalle();
});

// Auto-session + expiry handler
db.auth.getSession().then(function(res){
  if(res.data&&res.data.session&&res.data.session.user) showDash(res.data.session.user);
});
db.auth.onAuthStateChange(function(event,session){
  if(event==='SIGNED_OUT'||(event==='TOKEN_REFRESHED'&&!session)){
    window.location.href='/login?redirect='+encodeURIComponent(window.location.pathname);
  }
});
</script>

<div class="od-overlay" id="odOverlay" role="dialog" aria-modal="true" aria-labelledby="odTitle">
  <div class="od-sheet">
    <h3 id="odTitle" style="font-size:1.1rem;margin-bottom:1rem">Detalle del pedido</h3>
    <div id="odContent"></div>
    <button class="od-close" onclick="cerrarDetalle()">Cerrar</button>
  </div>
</div>
</body>
</html>
